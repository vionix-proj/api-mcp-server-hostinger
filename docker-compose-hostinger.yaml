services:
  api-mcp-server-hostinger:
    image: ghcr.io/vionix-proj/api-mcp-server-hostinger:main-e347d9b
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8100
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      HOSTINGER_SUBDOMAIN: ${HOSTINGER_SUBDOMAIN:?HOSTINGER_SUBDOMAIN is required}
      HOSTINGER_MCP_HOST: ${HOSTINGER_SUBDOMAIN:?HOSTINGER_SUBDOMAIN is required}.${DOMAIN:?DOMAIN is required}
      API_BASE_URL: ${API_BASE_URL:-https://developers.hostinger.com}
      OAUTH_ISSUER: ${OAUTH_ISSUER:-https://auth.hostinger.com}
      USER_AGENT: ${USER_AGENT:-api-mcp-server-hostinger-hostinger}
    command:
      - node
      - src/servers/all.js
      - --http
      - --host
      - 0.0.0.0
      - --port
      - "8100"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - "-e"
        - "fetch('http://127.0.0.1:8100/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.api-mcp-server-hostinger.rule=Host(`${HOSTINGER_SUBDOMAIN:?HOSTINGER_SUBDOMAIN is required}.${DOMAIN:?DOMAIN is required}`)
      - traefik.http.routers.api-mcp-server-hostinger.entrypoints=websecure
      - traefik.http.routers.api-mcp-server-hostinger.tls.certresolver=le
      - traefik.http.services.api-mcp-server-hostinger.loadbalancer.server.port=8100
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: traefik
